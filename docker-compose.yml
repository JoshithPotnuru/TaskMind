version: '3.8'

services:
  taskmind-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb-local:27017/taskmind
      - JWT_SECRET=production_jwt_secret_key_1234
      - REFRESH_SECRET=production_refresh_token_secret_5678
      - OPENAI_API_KEY=your_openai_api_key_here
      - CLOUDINARY_CLOUD_NAME=your_cloudinary_cloud_name
      - CLOUDINARY_API_KEY=your_cloudinary_api_key
      - CLOUDINARY_API_SECRET=your_cloudinary_api_secret
      - SMTP_HOST=smtp.mailtrap.io
      - SMTP_PORT=2525
      - SMTP_USER=your_smtp_user
      - SMTP_PASS=your_smtp_password
      - CLIENT_URL=http://localhost:5000
    depends_on:
      - mongodb-local

  mongodb-local:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
